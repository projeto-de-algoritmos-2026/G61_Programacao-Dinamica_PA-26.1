<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Programação Dinâmica</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../styleHeader.css">
</head>
<body>

<!-- ══ HEADER 100% INLINE COM KNAPSACK ATIVO ══ -->
<header style="box-sizing: border-box; margin: 0; padding: 0;">
  <nav style="box-sizing: border-box; margin: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; background: #ffffff; border-bottom: 1px solid #e5e5e5;">
    
    <!-- Logo -->
    <a href="../../index.html" style="box-sizing: border-box; margin: 0; padding: 0; display: flex; align-items: center; gap: 10px; text-decoration: none;">
      <div style="box-sizing: border-box; margin: 0; padding: 0; width: 32px; height: 32px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px;">
        <i class="ti ti-topology-star-3" aria-hidden="true" style="box-sizing: border-box; margin: 0; padding: 0;"></i>
      </div>
      <span style="box-sizing: border-box; margin: 0; padding: 0; font-size: 15px; font-weight: 500; color: #111;">
        Prog<span style="box-sizing: border-box; margin: 0; padding: 0; color: #2563eb;">Dinâmica</span>
      </span>
    </a>

    <!-- Nav Links -->
    <div style="box-sizing: border-box; margin: 0; padding: 0; display: flex; align-items: center; gap: 4px;">
      
      <!-- Home (normal) -->
      <a href="../../index.html" 
         style="box-sizing: border-box; margin: 0; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 14px; color: #555; text-decoration: none; transition: background 0.15s, color 0.15s; border: 1px solid transparent;"
         onmouseenter="this.style.background='#f5f5f5'; this.style.color='#111'; this.style.borderColor='#e5e5e5';"
         onmouseleave="this.style.background='transparent'; this.style.color='#555'; this.style.borderColor='transparent';">
        <i class="ti ti-home" aria-hidden="true" style="box-sizing: border-box; margin: 0; padding: 0; font-size: 15px;"></i>Home
      </a>
      
      <!-- Sobre nós (normal) -->
      <a href="../../sobre.html" 
         style="box-sizing: border-box; margin: 0; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 14px; color: #555; text-decoration: none; transition: background 0.15s, color 0.15s; border: 1px solid transparent;"
         onmouseenter="this.style.background='#f5f5f5'; this.style.color='#111'; this.style.borderColor='#e5e5e5';"
         onmouseleave="this.style.background='transparent'; this.style.color='#555'; this.style.borderColor='transparent';">
        <i class="ti ti-users" aria-hidden="true" style="box-sizing: border-box; margin: 0; padding: 0; font-size: 15px;"></i>Sobre nós
      </a>
      
      <!-- Knapsack (ATIVO) -->
      <a href="/algorithms/knapsack/index.html" 
         style="box-sizing: border-box; margin: 0; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 14px; text-decoration: none; transition: background 0.15s, color 0.15s; background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe;">
        <i class="ti ti-backpack" aria-hidden="true" style="box-sizing: border-box; margin: 0; padding: 0; font-size: 15px;"></i>Knapsack
      </a>
      
      <!-- Bellman-Ford (normal) -->
      <a href="/algorithms/bellmanford/index.html" 
         style="box-sizing: border-box; margin: 0; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 14px; color: #555; text-decoration: none; transition: background 0.15s, color 0.15s; border: 1px solid transparent;"
         onmouseenter="this.style.background='#f5f5f5'; this.style.color='#111'; this.style.borderColor='#e5e5e5';"
         onmouseleave="this.style.background='transparent'; this.style.color='#555'; this.style.borderColor='transparent';">
        <i class="ti ti-route" aria-hidden="true" style="box-sizing: border-box; margin: 0; padding: 0; font-size: 15px;"></i>Bellman-Ford
      </a>
      
      <!-- Contato (normal) -->
      <a href="../../contato.html" 
         style="box-sizing: border-box; margin: 0; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 14px; color: #555; text-decoration: none; transition: background 0.15s, color 0.15s; border: 1px solid transparent;"
         onmouseenter="this.style.background='#f5f5f5'; this.style.color='#111'; this.style.borderColor='#e5e5e5';"
         onmouseleave="this.style.background='transparent'; this.style.color='#555'; this.style.borderColor='transparent';">
        <i class="ti ti-mail" aria-hidden="true" style="box-sizing: border-box; margin: 0; padding: 0; font-size: 15px;"></i>Contato
      </a>

    </div>
  </nav>
</header>

<div class="page">

  <div class="title-row">
    <div class="title-icon"><i class="ti ti-backpack" aria-hidden="true"></i></div>
    <h1>Simulador de <span>Programação Dinâmica</span></h1>
  </div>

  <div class="card">
    <div class="section-label">Entrada — Knapsack 0/1</div>
    <div class="input-row">
      <div class="field">
        <label for="cap">Capacidade (W)</label>
        <input type="number" id="cap" value="6" min="1" max="25">
      </div>
      <div class="field">
        <label for="nitems">Itens (n)</label>
        <input type="number" id="nitems" value="3" min="1" max="24">
      </div>
      <button class="btn primary" onclick="autoGenerate()">
        <i class="ti ti-sparkles" aria-hidden="true"></i>Gerar automaticamente
      </button>
      <button class="btn" onclick="solve()">
        <i class="ti ti-player-play" aria-hidden="true"></i>Resolver
      </button>
    </div>
    <div class="item-list" id="item-list"></div>
  </div>

  <div class="card">
    <div class="section-label">Tabela DP</div>
    <div class="matrix-wrap" id="matrix-wrap">
      <p class="empty-msg">Resolva o problema para ver a tabela.</p>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Legenda e navegação</div>
    <div class="legend-row">
      <div class="legend-text" id="legend-text">Resolva o problema para iniciar a navegação passo a passo.</div>
      <div class="opt-badge" id="opt-badge" style="display:none"></div>
    </div>
    <div class="legend-controls">
      <div class="nav-btns">
        <button class="btn sm" onclick="stepNav(-1)">
          <i class="ti ti-arrow-left" aria-hidden="true"></i>Anterior
        </button>
        <span class="step-counter" id="step-counter">—</span>
        <button class="btn sm" onclick="stepNav(1)">
          Próximo<i class="ti ti-arrow-right" aria-hidden="true"></i>
        </button>
      </div>
      <div class="overlay-row">
        <input type="checkbox" id="show-overlay" checked onchange="renderMatrix()">
        <label for="show-overlay">Mostrar overlay SVG na matriz</label>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Árvore recursiva</div>
    <div id="tree-wrap" class="tree-wrap">
      <p class="empty-msg">A árvore aparece após resolver.</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
