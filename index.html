<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Programação Dinâmica</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="styleHeader.css">
</head>
<body>
    <header>
        <nav>
            <a href="#" class="logo">
                <div class="logo-icon">
                    <i class="ti ti-topology-star-3" aria-hidden="true"></i>
                </div>
                <span class="logo-text">Prog<span>Dinâmica</span></span>
            </a>

            <div class="nav-links">
                <a href="#" class="active">
                    <i class="ti ti-home" aria-hidden="true"></i>
                    Home
                </a>
                <a href="#">
                    <i class="ti ti-users" aria-hidden="true"></i>
                    Sobre nós
                </a>
                <a href="#">
                    <i class="ti ti-backpack" aria-hidden="true"></i>
                    Knapsack
                </a>
                <a href="#">
                    <i class="ti ti-route" aria-hidden="true"></i>
                    Bellman-Ford
                </a>
                <a href="#">
                    <i class="ti ti-mail" aria-hidden="true"></i>
                    Contato
                </a>
            </div>
        </nav>
    </header>

    <div style="width: 100%; height: 100vh; background: #2563eb;"></div>
    <div style="width: 100%; height: 100vh; background: #111111;"></div>

    <footer style="background: #ffffff; border-top: 1px solid #e5e5e5; padding: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; max-width: 960px; margin: 0 auto;">

            <div style="display: flex; flex-direction: column; gap: 8px;">
            <a href="#" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                <div style="width: 32px; height: 32px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px;">
                <i class="ti ti-topology-star-3" aria-hidden="true"></i>
                </div>
                <span style="font-size: 15px; font-weight: 500; color: #111;">Prog<span style="color: #2563eb;">Dinâmica</span></span>
            </a>
            <p style="font-size: 13px; color: #888; max-width: 220px; line-height: 1.6;">
                Simulador interativo de algoritmos de programação dinâmica.
            </p>
            </div>

            <div style="display: flex; gap: 3rem;">

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <span style="font-size: 12px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: 0.06em;">Navegação</span>
                <a href="#" style="font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 6px;">
                <i class="ti ti-home" aria-hidden="true" style="font-size: 14px;"></i>Home
                </a>
                <a href="#" style="font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 6px;">
                <i class="ti ti-users" aria-hidden="true" style="font-size: 14px;"></i>Sobre nós
                </a>
                <a href="#" style="font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 6px;">
                <i class="ti ti-mail" aria-hidden="true" style="font-size: 14px;"></i>Contato
                </a>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <span style="font-size: 12px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: 0.06em;">Algoritmos</span>
                <a href="#" style="font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 6px;">
                <i class="ti ti-backpack" aria-hidden="true" style="font-size: 14px;"></i>Knapsack
                </a>
                <a href="#" style="font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 6px;">
                <i class="ti ti-route" aria-hidden="true" style="font-size: 14px;"></i>Bellman-Ford
                </a>
            </div>

            </div>
        </div>

        <div style="border-top: 1px solid #e5e5e5; margin-top: 2rem; padding-top: 1rem; max-width: 960px; margin: 2rem auto 0; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 12px; color: #888;">© 2026 ProgDinâmica. Todos os direitos reservados.</span>
        </div>

    </footer>
</body>
</html>
